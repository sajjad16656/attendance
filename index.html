body{

<style>

<!-- ===========================
     JAVASCRIPT
=========================== -->

<script>

const script_url =
"https://script.google.com/macros/s/AKfycbz_NS4wpAGeZcjATGYP_X8zmjuag9f-V4NphiCbOKtl_vWfH7mfXrVhXqcgz94H4Ubf/exec";

const loader =
document.getElementById("loader");

const msg =
document.getElementById("msg");

const btnIn =
document.getElementById("btnIn");

const btnOut =
document.getElementById("btnOut");

const empid =
document.getElementById("empid");

const empname =
document.getElementById("empname");

const locationSelect =
document.getElementById("locationSelect");
const remarks =
document.getElementById("remarks");
/* ===========================================
   PART 4
   Utility Functions & Event Handlers
=========================================== */

// Mobile Number Validation
function validateMobileInput(input) {

    input.value = input.value.replace(/[^0-9]/g, "");

    if (input.value.startsWith("0")) {
        input.value = input.value.substring(1);
    }

    if (input.value.length > 10) {
        input.value = input.value.substring(0, 10);
    }

}

// Attach Validation
empid.addEventListener("input", function () {
    validateMobileInput(this);
});

// Device Fingerprint
// Device Fingerprint with Mobile Number Binding
function generateDeviceFingerprint() {

    const info = [
        empid.value.trim(), // ٹھیک کیا گیا: موبائل نمبر کو ٹوکن کا حصہ بنا دیا تا کہ یہ ہمیشہ منفرد رہے

        navigator.userAgent,

        navigator.language,

        screen.width,

        screen.height,

        screen.colorDepth,

        Intl.DateTimeFormat().resolvedOptions().timeZone,

        navigator.hardwareConcurrency || "",

        navigator.platform

    ].join("|");

    let hash = 0;

    for (let i = 0; i < info.length; i++) {

        hash = ((hash << 5) - hash) + info.charCodeAt(i);

        hash |= 0;

    }

    // اب ٹوکن ہر ملازم کے نمبر کے حساب سے بالکل الگ بنے گا
    return "DEV-" + empid.value.trim() + "-" + Math.abs(hash);

}

// Battery Status
async function getBatteryStatus() {

    if (!navigator.getBattery) {

        return "Not Supported";

    }

    try {

        const battery = await navigator.getBattery();

        return Math.round(battery.level * 100) + "%" +
            (battery.charging ? " (Charging)" : "");

    }

    catch (e) {

        return "Unknown";

    }

}

// Device OS
function getDeviceOS() {

    const ua = navigator.userAgent;

    if (/Android/i.test(ua))
        return "Android Mobile";

    if (/iPhone|iPad|iPod/i.test(ua))
        return "Apple iOS";

    return "Unknown Device";

}

// Message Box
function showMessage(text, color = "#0b7a3e") {

    msg.style.color = color;

    msg.innerHTML = text;

}

// Loading
function showLoader() {

    loader.style.display = "block";

    btnIn.disabled = true;

    btnOut.disabled = true;

}

function hideLoader() {

    loader.style.display = "none";

    btnIn.disabled = false;

    btnOut.disabled = false;

}

// Form Validation
function validateForm() {

    if (empid.value.trim() === "") {

        showMessage("Please enter Mobile Number.", "red");

        return false;

    }

    if (empid.value.trim().length !== 10) {

        showMessage("Mobile Number must be 10 digits.", "red");

        return false;

    }

    if (empname.value.trim() === "") {

        showMessage("Please enter Employee Name.", "red");

        return false;

    }

    if (locationSelect.value === "") {

        showMessage("Please select Duty Station.", "red");

        return false;

    }

    return true;

}


/* ===========================================
   PART 5
   GPS + Google Apps Script Integration
=========================================== */

async function sendLocation(actionType) {

    if (!validateForm()) return;

    showLoader();

    showMessage("Getting GPS Location...");

    // Mobile Only
    const isMobile =
        /Android|iPhone|iPad|Mobile/i.test(navigator.userAgent);

    if (!isMobile && location.protocol !== "file:") {

        hideLoader();

        showMessage(
            "Attendance is allowed from mobile devices only.",
            "red"
        );

        return;
    }

    // ON LEAVE
    if (locationSelect.value === "ON LEAVE") {
const remarks =
document.getElementById("remarks");
        const payload = {

            Type: actionType,

            EmployeeID: "92" + empid.value.trim(),

            EmployeeName: empname.value.trim(),

            Latitude: "N/A (On Leave)",

            Longitude: "N/A (On Leave)",

            Accuracy: "N/A",

            City: "ON LEAVE",
            Remarks: remarks.value.trim(),
            BatteryPercentage: await getBatteryStatus(),

            MobileType: getDeviceOS(),

          /*  DeviceToken: generateDeviceFingerprint() */
DeviceToken: generateDeviceFingerprint() + "-" + empid.value.trim(),
        };

        return postAttendance(payload);

    }

    if (!navigator.geolocation) {

        hideLoader();

        showMessage(

            "GPS is not supported on this device.",

            "red"

        );

        return;

    }

    navigator.geolocation.getCurrentPosition(

        async function(position){

            const accuracy = Math.round(position.coords.accuracy);
            checkAccuracy(accuracy);

            const payload={

                Type:actionType,

                EmployeeID:"92"+empid.value.trim(),

                EmployeeName:empname.value.trim(),

                Latitude:position.coords.latitude,

                Longitude:position.coords.longitude,

                Accuracy:accuracy,

                City:locationSelect.value,

 Remarks: remarks.value.trim(),   // <-- Ye line add karo
                BatteryPercentage: await getBatteryStatus(),

                MobileType: getDeviceOS(),

                DeviceToken:generateDeviceFingerprint()

            };

            postAttendance(payload);

        },

        function(error){

            hideLoader();

            switch(error.code){

                case error.PERMISSION_DENIED:

                    showMessage(

                        "GPS Permission Denied.",

                        "red"

                    );

                    break;

                case error.POSITION_UNAVAILABLE:

                    showMessage(

                        "GPS Position Unavailable.",

                        "red"

                    );

                    break;

                case error.TIMEOUT:

                    showMessage(

                        "GPS Request Timed Out.",

                        "red"

                    );

                    break;

                default:

                    showMessage(

                        "Unable to get GPS Location.",

                        "red"

                    );

            }

        },

        {

            enableHighAccuracy:true,

            timeout:20000,

            maximumAge:0

        }

    );

}

/* ===========================================
   POST TO GOOGLE APPS SCRIPT
=========================================== */

async function postAttendance(payload){

    showMessage("Submitting Attendance...");

    try{

        const response=await fetch(script_url,{

            method:"POST",

            headers:{

                "Content-Type":"text/plain;charset=utf-8"

            },

            body:JSON.stringify(payload)

        });

        const result=await response.json();

        hideLoader();

        if(result.success){

            showMessage(

                "✅ "+result.message,

                "#0b7a3e"

            );

            empid.value="";

            empname.value="";

            locationSelect.selectedIndex=0;
remarks.value="";
        }else{

            showMessage(

                "❌ "+result.error,

                "red"

            );

        }

    }

    catch(ex){

        hideLoader();

        showMessage(

            "Network Error : "+ex.message,

            "red"

        );

    }

}
/* ===========================================
   PART 6
   Final UI, Connectivity & Helpers
=========================================== */

// -------------------------
// Auto Focus
// -------------------------

window.addEventListener("load", () => {

    empid.focus();

    showMessage("Ready for Attendance");

});

// -------------------------
// Internet Status
// -------------------------

window.addEventListener("offline", () => {

    showMessage(
        "No Internet Connection.",
        "red"
    );

});

window.addEventListener("online", () => {

    showMessage(
        "Internet Connected."
    );

});

// -------------------------
// GPS Accuracy Warning
// -------------------------

function checkAccuracy(acc){

    if(acc>100){

        showMessage(
            "GPS Accuracy is low ("+acc+" m). Move to an open area."
        );

    }

}

// -------------------------
// Auto Save Last Name
// -------------------------

empname.addEventListener("change",()=>{

    localStorage.setItem(
        "LastEmployee",
        empname.value
    );

});

window.addEventListener("load",()=>{

    const lastName=
        localStorage.getItem("LastEmployee");

    if(lastName){

        empname.value=lastName;

    }

});

// -------------------------
// Enter Key Navigation
// -------------------------

empid.addEventListener("keypress",e=>{

    if(e.key==="Enter")
        empname.focus();

});

empname.addEventListener("keypress",e=>{

    if(e.key==="Enter")
        locationSelect.focus();

});

// -------------------------
// Double Click Protection
// -------------------------

let requestRunning=false;

async function safeSend(type){

    if(requestRunning){

        return;

    }

    requestRunning=true;

    try{

        await sendLocation(type);

    }

    finally{

        requestRunning=false;

    }

}

btnIn.removeEventListener?.("click",sendLocation);
btnOut.removeEventListener?.("click",sendLocation);

btnIn.onclick=()=>safeSend("IN");
btnOut.onclick=()=>safeSend("OUT");

// -------------------------
// Fetch Timeout Wrapper
// -------------------------

async function fetchWithTimeout(url,options={},timeout=20000){

    const controller=new AbortController();

    const timer=setTimeout(()=>{

        controller.abort();

    },timeout);

    try{

        const response=await fetch(url,{
            ...options,
            signal:controller.signal
        });

        clearTimeout(timer);

        return response;

    }

    catch(err){

        clearTimeout(timer);

        throw err;

    }

}

// -------------------------
// Success Animation
// -------------------------

function flashSuccess(){

    document.querySelector(".container")
    .animate(

        [

            {transform:"scale(1)"},

            {transform:"scale(1.02)"},

            {transform:"scale(1)"}

        ],

        {

            duration:400

        }

    );

}

// -------------------------
// Error Animation
// -------------------------

function flashError(){

    document.querySelector(".container")
    .animate(

        [

            {transform:"translateX(-6px)"},

            {transform:"translateX(6px)"},

            {transform:"translateX(-6px)"},

            {transform:"translateX(0)"}

        ],

        {

            duration:300

        }

    );

}

// -------------------------
// Update Message Function
// -------------------------

const oldShowMessage=showMessage;

showMessage=function(text,color="#0b7a3e"){

    oldShowMessage(text,color);

    if(color==="red"){

        flashError();

    }else{

        flashSuccess();

    }

};

// -------------------------
// Prevent Form Refresh
// -------------------------

document.addEventListener("keydown",function(e){

    if(e.key==="F5"){

        e.preventDefault();

    }

});

// -------------------------
// End
// -------------------------

console.log(
    "HQ NLC TPT Fleet Attendance Loaded Successfully."
);

</script>
