<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b7a3e">
<meta name="description" content="HQ NLC TPT Fleet Attendance System">
<title>HQ NLC TPT Fleet Attendance</title>

<!-- Google Font -->
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background: linear-gradient(135deg, #0b7a3e, #118847, #22b15d);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:25px;
overflow-x:hidden;
}

.container{
width:450px;
max-width:100%;
background:#ffffff;
border-radius:28px;
overflow:hidden;
box-shadow: 0 25px 60px rgba(0,0,0,.25);
animation:fadeIn .6s ease;
position:relative;
}

@keyframes fadeIn{
0%{ opacity:0; transform:translateY(30px); }
100%{ opacity:1; transform:translateY(0); }
}

.header{
background: linear-gradient(135deg, #0b7a3e, #14984d);
padding:35px 25px;
text-align:center;
position:relative;
color:#fff;
}

.header::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:-22px;
height:45px;
background:#fff;
border-radius:100%;
}

.logo{
width:82px;
height:82px;
border-radius:50%;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
font-size:40px;
color:#0b7a3e;
box-shadow: 0 12px 30px rgba(0,0,0,.25);
position:relative;
z-index:10;
}

.header h1{
margin-top:18px;
font-size:25px;
font-weight:700;
letter-spacing:.3px;
position:relative;
z-index:10;
}

.header p{
margin-top:10px;
font-size:14px;
opacity:.95;
position:relative;
z-index:10;
}

.content{
padding:55px 30px 30px;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:600;
color:#444;
}

.input-group{
margin-bottom:22px;
}

.input-box{
position:relative;
}

.input-box input,
.input-box select{
width:100%;
height:58px;
border:2px solid #e5e5e5;
border-radius:15px;
background:#fafafa;
outline:none;
padding:0 18px;
font-size:15px;
transition:.30s;
color:#333;
}

.input-box input:focus,
.input-box select:focus{
border-color:#0b7a3e;
background:#fff;
box-shadow: 0 0 0 5px rgba(11,122,62,.10);
}

.input-box input::placeholder{ color:#999; }
.prefix{
position:absolute;
left:18px;
top:50%;
transform:translateY(-50%);
font-size:16px;
font-weight:700;
color:#0b7a3e;
}

#empid{ padding-left:58px; }

.button-row{
display:flex;
gap:14px;
margin-top:8px;
}

button{
flex:1;
height:58px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:16px;
font-weight:600;
color:#fff;
transition:.30s;
}

.checkin-btn{
background:linear-gradient(135deg, #0b7a3e, #18a84f);
box-shadow: 0 12px 25px rgba(11,122,62,.30);
}

.checkout-btn{
background:linear-gradient(135deg, #d93025, #b71c1c);
box-shadow: 0 12px 25px rgba(217,48,37,.30);
}

button:hover{ transform:translateY(-3px); }
button:active{ transform:scale(.98); }
button:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

#msg{
margin-top:24px;
min-height:60px;
padding:16px;
border-radius:14px;
background:#eef9f2;
border:1px solid #d6f0df;
color:#0b7a3e;
font-weight:600;
font-size:14px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
line-height:1.5;
transition:.30s;
}

.loader{
display:none;
margin:18px auto;
width:45px;
height:45px;
border:5px solid #ddd;
border-top:5px solid #0b7a3e;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{ 100%{ transform:rotate(360deg); } }

.footer{
padding:22px;
text-align:center;
font-size:12px;
background:#fafafa;
border-top:1px solid #eee;
color:#888;
}

.footer strong{ color:#0b7a3e; }

@media(max-width:480px){
.container{ width:100%; }
.content{ padding:50px 20px 25px; }
.header{ padding:28px 18px; }
.header h1{ font-size:22px; }
button{ height:55px; font-size:15px; }
}
</style>
</head>

<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <i class="fa-solid fa-location-dot"></i>
        </div>
        <h1>HQ NLC TPT FLEET GWA</h1>
        <p>Employee Attendance & GPS Tracking System</p>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <!-- Mobile Number Input -->
        <div class="input-group">
            <label>Employee Mobile Number</label>
            <div class="input-box">
                <span class="prefix">+92</span>
                <input type="tel" id="empid" maxlength="10" placeholder="3001234567" autocomplete="off">
            </div>
        </div>

        <!-- Employee Name Input -->
        <div class="input-group">
            <label>Employee Name</label>
            <div class="input-box">
                <input type="text" id="empname" placeholder="Enter Employee Name" autocomplete="off">
            </div>
        </div>

        <!-- Duty Station Selection Dropdown -->
        <div class="input-group">
            <label>Duty Station</label>
            <div class="input-box">
                <select id="locationSelect">
                    <option value="">Select Duty Station</option>
                    <option value="CCI Lhr">CCI Lhr</option>
                    <option value="CCI Fsd">CCI Fsd</option>
                    <option value="CCI Hattar">CCI Hattar</option>
                    <option value="CCI RYK">CCI RYK</option>
                    <option value="GB-9">GB-9</option>
                    <option value="POF WAH">POF Wah</option>
                    <option value="FCC DK">FCC DK</option>
                    <option value="FFC Hazara">FFC Hazara</option>
                    <option value="Proj Gwa">Proj Gwa</option>
                    <option value="ON LEAVE">🌴 ON LEAVE</option>
                </select>
            </div>
        </div>

        <!-- Submission Action Buttons -->
        <div class="button-row">
            <button id="btnIn" class="checkin-btn">
                <i class="fa-solid fa-right-to-bracket"></i> Check In
            </button>
            <button id="btnOut" class="checkout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Check Out
            </button>
        </div>

        <!-- CSS Animated Spinner Loader -->
        <div class="loader" id="loader"></div>

        <!-- Diagnostics Dynamic Status Messaging Box -->
        <div id="msg">Ready for Attendance...</div>
    </div>

    <!-- FOOTER CREDITS -->
    <div class="footer">
        Developed by <strong>Syed Muhammad Sajjad Ali</strong>
    </div>
</div>

<script>

// 1. Device Hardware Context Architecture Parser
function getMobileType() {
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    if (/android/i.test(userAgent)) {
        return "Android Mobile";
    }
    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        return "Apple iOS";
    }
    return "Web/Desktop Browser";
}

// 2. Battery Percentage API Diagnostics Engine
async function getBatteryStatus() {
    if (navigator.getBattery) {
        try {
            const battery = await navigator.getBattery();
            let percentage = Math.round(battery.level * 100);
            if (battery.charging) {
                return percentage + "% (Chg)";
            }
            return percentage + "%";
        } catch (e) {
            return "Not Supported";
        }
    }
    return "Not Supported";
}
