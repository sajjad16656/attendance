<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HQ NLC TPT Fleet Attendance</title>

<!-- 🌟 Corrected Google Fonts Integration Link -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ background:linear-gradient(135deg,#0b7a3e,#179b57,#29b96c); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:25px; }
.container{ width:430px; max-width:100%; background:white; border-radius:25px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.25); animation:fade .5s; }
@keyframes fade{ from{ opacity:0; transform:translateY(25px); } to{ opacity:1; transform:none; } }
.header{ background:linear-gradient(135deg,#0b7a3e,#0ea64b); padding:35px 20px; text-align:center; color:white; }
.header .icon{ width:75px; height:75px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:auto; font-size:36px; color:#0b7a3e; margin-bottom:18px; box-shadow:0 10px 20px rgba(0,0,0,.20); }
.header h1{ font-size:25px; font-weight:700; }
.header p{ margin-top:8px; font-size:14px; opacity:.95; }
.content{ padding:30px; }
label{ display:block; margin-bottom:8px; font-weight:600; color:#444; font-size:14px; }
.input-box{ position:relative; margin-bottom:22px; }
.input-box input, .input-box select{ width:100%; height:55px; border:2px solid #e5e5e5; border-radius:14px; padding:0 18px; font-size:15px; outline:none; transition:.3s; background:#fafafa; }
.input-box input:focus, .input-box select:focus{ border-color:#0b7a3e; background:white; box-shadow:0 0 0 5px rgba(11,122,62,.10); }
.prefix{ position:absolute; left:18px; top:50%; transform:translateY(-50%); font-weight:700; color:#0b7a3e; font-size:16px; }
#empid{ padding-left:55px; }
.btn-group-custom { display: flex; gap: 12px; margin-top: 10px; }
button { flex: 1; height: 58px; border: none; border-radius: 15px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: .3s; }
.btn-checkin { background: linear-gradient(135deg,#0b7a3e,#16a34a); box-shadow: 0 12px 25px rgba(11,122,62,.30); }
.btn-checkout { background: linear-gradient(135deg,#dc3545,#bd2130); box-shadow: 0 12px 25px rgba(220,53,69,.30); }
button:hover { transform: translateY(-3px); }
button:active { transform:scale(.98); }
#msg{ margin-top:22px; padding:15px; border-radius:12px; background:#eef9f2; color:#0b7a3e; text-align:center; font-weight:600; font-size:14px; border:1px solid #d6f0df; min-height:54px; display:flex; justify-content:center; align-items:center; word-wrap:break-word; }
.footer{ padding:20px; text-align:center; font-size:12px; color:#999; border-top:1px solid #eee; background:#fafafa; }
.footer strong{ color:#0b7a3e; }
@media(max-width:450px){ .content{ padding:22px; } .header{ padding:28px 15px; } .header h1{ font-size:22px; } button{ height:55px; font-size:15px; } }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="icon">📍</div>
        <h1>HQ NLC TPT Fleet Gwa</h1>
        <p>Employee Attendance & GPS Tracking System</p>
    </div>

    <div class="content">
        <label>Employee Mobile Number</label>
        <div class="input-box">
            <span class="prefix">92</span>
            <input type="tel" id="empid" placeholder="3001234567" maxlength="10" oninput="validateMobileInput(this)">
        </div>

        <label>Employee Name</label>
        <div class="input-box">
            <input type="text" id="empname" placeholder="Enter employee name">
        </div>

        <label>Duty Station</label>
        <div class="input-box">
            <select id="locationSelect">
                <option value="CCI Lhr">CCI Lhr</option>
                <option value="CCI Fsd">CCI Fsd</option>
                <option value="CCI Hattar">CCI Hattar</option>
                <option value="CCI RYK">CCI RYK</option>
                <option value="GB-9">GB-9</option>
                <option value="POF WAH">POF Wah</option>
                <option value="FCC DK">FCC DK</option>
                <option value="FFC Hazara">FFC Hazara</option>
                <option value="ON LEAVE">🌴 ON LEAVE</option>
            </select>
        </div>

        <div class="btn-group-custom">
            <button class="btn-checkin" onclick="processAttendance('IN')">🛫 Check In</button>
            <button class="btn-checkout" onclick="processAttendance('OUT')">🛬 Check Out</button>
        </div>

        <div id="msg">Ready for attendance...</div>
    </div>

    <div class="footer">
        Developed by <strong>ICT GWA | Syed Muhammad Sajjad Ali</strong>
    </div>
</div>

<script>
const script_url = "https://script.google.com/macros/s/AKfycbxFdvRyrTXecw__cPuQQLP90evOnGgN2hKI4DmMqAi2oEaLAnYuBY9aBEfxaUYp57fDRw/exec";

function validateMobileInput(input) {
    input.value = input.value.replace(/[^0-9]/g, '');
    if (input.value.startsWith('0')) {
        input.value = input.value.substring(1);
    }
}

function generateDeviceFingerprint() {
    try {
        const specs = [navigator.userAgent, screen.height, screen.width, screen.colorDepth, navigator.language, new Date().getTimezoneOffset()].join('||');
        let hash = 0;
        for (let i = 0; i < specs.length; i++) {
            const char = specs.charCodeAt(i);
            hash = ((hash << 5) - hash) + char; hash |= 0;
        }
        return "DEV-" + Math.abs(hash);
    } catch(e) { return "DEV-UNKNOWN"; }
}

async function getBatteryStatus() {
    if (navigator.getBattery) {
        try {
            const battery = await navigator.getBattery();
            return Math.round(battery.level * 100) + "%" + (battery.charging ? " (Chg)" : "");
        } catch (e) { return "Unknown"; }
    }
    return "Not Supported";
}

function getDeviceOS() {
    const ua = navigator.userAgent;
    if (/Android/i.test(ua)) return "Android Mobile";
    if (/iPhone|iPad/i.test(ua)) return "Apple iOS";
    return "Mobile Phone";
}

function submitToSheet(payload) {
    const msgDiv = document.getElementById("msg");
    msgDiv.innerText = "Connecting to Google Sheet backend...";

    fetch(script_url, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            msgDiv.style.color = "#0b7a3e";
            msgDiv.style.background = "#eef9f2";
            msgDiv.style.borderColor = "#d6f0df";
            msgDiv.innerText = data.message;
            document.getElementById("empid").value = "";
            document.getElementById("empname").value = "";
        } else {
            msgDiv.style.color = "red";
            msgDiv.style.background = "#fff5f5";
            msgDiv.style.borderColor = "#fed7d7";
            msgDiv.innerText = data.error;
        }
    })
    .catch(err => {
        msgDiv.style.color = "red";
        msgDiv.style.background = "#fff5f5";
        msgDiv.style.borderColor = "#fed7d7";
        msgDiv.innerText = "Network Error: Google Sheet not responding.";
        console.error(err);
    });
}

function processAttendance(actionType) {
    const empid = document.getElementById("empid").value.trim();
    const empname = document.getElementById("empname").value.trim();
    const selectedLoc = document.getElementById("locationSelect").value;
    const msgDiv = document.getElementById("msg");

    // 🌟 Immediate feedback block to guarantee button response activity
    msgDiv.style.color = "#0b7a3e";
    msgDiv.style.background = "#eef9f2";
    msgDiv.innerText = "Processing system triggers...";

    if (!empid || !empname) {
        msgDiv.style.color = "red";
        msgDiv.style.background = "#fff5f5";
        msgDiv.style.borderColor = "#fed7d7";
        msgDiv.innerText = "Error: Please fill out all fields.";
        return;
    }

    if (empid.length !== 10) {
        msgDiv.style.color = "red";
        msgDiv.style.background = "#fff5f5";
        msgDiv.style.borderColor = "#fed7d7";
        msgDiv.innerText = "Error: Mobile number ghalat hai! Poore 10 digits likhein.";
        return;
    }

    const formattedMobile = "92" + empid;

    if (selectedLoc === "ON LEAVE") {
        msgDiv.innerText = "Processing leave status...";
        getBatteryStatus().then(battery => {
            const payload = {
                Type: actionType,
                EmployeeID: formattedMobile,
                EmployeeName: empname,
                Latitude: "N/A (On Leave)",
                Longitude: "N/A (On Leave)",
                Accuracy: "N/A",
                City: "ON LEAVE",
                Battery: battery,
                Device: getDeviceOS(),
                DeviceToken: generateDeviceFingerprint()
            };
            submitToSheet(payload);
        });
        return;
    }

    msgDiv.innerText = "Requesting secure mobile GPS lock...";

    // 🗺️ Bulletproof Geolocation prompt framework with automatic bypass fallback
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            async(position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const accuracy = position.coords.accuracy ? Math.round(position.coords.accuracy) + "m" : "Unknown";
                const battery = await getBatteryStatus();
                const deviceToken = generateDeviceFingerprint();

                const payload = {
                    Type: actionType,
                    EmployeeID: formattedMobile,
                    EmployeeName: empname,
                    Latitude: lat,
                    Longitude: lon,
                    Accuracy: accuracy,
                    City: selectedLoc,
