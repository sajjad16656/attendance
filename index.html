<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>HQ TPT Gujranwala</title> 
    <style> 
        body{ margin:0; padding:0; background:#f5f5f5; font-family:arial,helvetica,sans-serif; } 
        .container{ width:380px; max-width:95%; margin:40px auto; background:#ffffff; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,.20); padding:25px; box-sizing:border-box; } 
        .logo{ font-size:28px; color:#0b7a3e; text-align:center; font-weight:bold; margin-bottom:5px; } 
        .title{ text-align:center; color:#555; font-size:18px; margin-bottom:25px; } 
        label{ display:block; margin-top:15px; margin-bottom:5px; font-weight:bold; color:#444; } 
        input, select{ width:100%; padding:12px; border:1px solid #cccccc; border-radius:6px; font-size:16px; box-sizing:border-box; background: white; } 
        button{ width:100%; margin-top:25px; padding:14px; border:none; border-radius:6px; background:#0b7a3e; color:white; font-size:18px; cursor:pointer; } 
        button:hover{ background:#06662f; } 
        #msg{ margin-top:20px; text-align:center; font-weight:bold; color:#0b7a3e; } 
        .footer{ margin-top:30px; text-align:center; color:#888; font-size:12px; } 
        /* 🌟 Visual Layout for Pakistani format styling */
        .prefix-container { position: relative; display: flex; align-items: center; }
        .prefix-text { position: absolute; left: 12px; font-size: 16px; color: #555; font-weight: bold; pointer-events: none; }
        #empid { padding-left: 50px; } 
    </style> 
</head> 
<body> 
    <div class="container"> 
        <div class="logo"> HQ TPT FLEET GUJRANWALA </div> 
        <div class="title"> Employee Attendance/Tracking System </div> 
        
        <label>Employee Mobile No</label> 
        <div class="prefix-container">
            <span class="prefix-text">92</span>
            <!-- 🌟 Live block engine: numbers only and max 10 inputs allocation -->
            <input type="tel" id="empid" placeholder="3001234567" maxlength="10" oninput="validateMobileInput(this)">
        </div>
        
        <label>Employee name</label> 
        <input type="text" id="empname" placeholder="enter employee name"> 

        <label>Select duty station / location</label> 
        <select id="locationSelect">
            <option value="CCI Lhr">CCI Lhr</option>
            <option value="CCI Fsd">CCI Fsd</option>
            <option value="CCI Hattar">CCI Hattar</option>
            <option value="CCI RYK">CCI RYK</option>
            <option value="GB-9">GB-9</option>
            <option value="POF WAH">POF WAH</option>
            <option value="FCC DK">FCC DK</option>
            <option value="FFC Hazara">FFC Hazara</option>
        </select>
        
        <button onclick="sendlocation()"> 📍 Mark Attendance </button> 
        <div id="msg"> ready... </div> 
        <div class="footer"> Develop by ICT GWA Syed Muhammad Sajjad Ali </div> 
    </div> 

<script>
    const script_url = "https://script.google.com/macros/s/AKfycbzxVqjPBgbf2YcFOyhpux6gxVQFThyOWCyXxpFW8z9PLA6ZeCQDJsQuNM6GEbnOQSTAYQ/exec";

    // 🌟 LIVE FILTER LOGIC: Shuru mein 0 nahi likhne dega aur baaki alphabets block karega
    function validateMobileInput(input) {
        input.value = input.value.replace(/[^0-9]/g, ''); // Clear letters
        if (input.value.startsWith('0')) {
            input.value = input.value.substring(1); // Drop the zero
        }
    }

    // 🔒 Unique token hashing algorithm generator
    function generateDeviceFingerprint() {
        const specs = [
            navigator.userAgent, screen.height, screen.width, screen.colorDepth, navigator.language, new Date().getTimezoneOffset()
        ].join('||');
        let hash = 0;
        for (let i = 0; i < specs.length; i++) {
            const char = specs.charCodeAt(i);
            hash = ((hash << 5) - hash) + char; hash |= 0; 
        }
        return "DEV-" + Math.abs(hash);
    }

    async function getBatteryStatus() {
        if (navigator.getBattery) {
            try {
                const battery = await navigator.getBattery();
                return Math.round(battery.level * 100) + "%" + (battery.charging ? " (Chg)" : "");
            } catch (e) { return "Unknown"; }
        }
        return "Not Supported";
    }

    function getDeviceOS() {
        const ua = navigator.userAgent;
        if (/Android/i.test(ua)) return "Android Mobile";
        if (/iPhone|iPad/i.test(ua)) return "Apple iOS";
        return "Mobile Phone";
    }

    function sendlocation() {
        const empid = document.getElementById("empid").value.trim();
        const empname = document.getElementById("empname").value.trim();
        const selectedLoc = document.getElementById("locationSelect").value;
        const msgDiv = document.getElementById("msg");

        // 🚨 1. Desktop Device Control Protection Block
        const isMobile = /Mobile|Android|iPhone|iPad/i.test(navigator.userAgent);
        if (!isMobile) {
            msgDiv.style.color = "red";
            msgDiv.innerText = "Security Error: Check-in sirf Mobile phone se allow hai! Desktop/PC blocked.";
            return;
        }

        if (!empid || !empname) {
            msgDiv.style.color = "red";
            msgDiv.innerText = "Error: Please fill out all fields.";
            return;
        }

        // 🚨 2. Exact 10 digits parameters validation test
        if (empid.length !== 10) {
            msgDiv.style.color = "red";
            msgDiv.innerText = "Error: Mobile number ghalat hai! Shuru ka 0 mita kar poore 10 hinde (3xxxxxxxxx) likhein.";
            return;
        }

        msgDiv.style.color = "#0b7a3e";
        msgDiv.innerText = "Requesting secure mobile GPS lock...";

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const accuracy = position.coords.accuracy ? Math.round(position.coords.accuracy) + "m" : "Unknown";
                const battery = await getBatteryStatus();
                const deviceToken = generateDeviceFingerprint();

                // Formatted mobile structure constructor string (+92 format integration)
                const formattedMobile = "92" + empid;

                // 🚨 150m Weak accuracy check layer
                if (position.coords.accuracy > 150) {
                    msgDiv.style.color = "red";
                    msgDiv.innerText = "GPS signal weak! Kisi khuli jagah par ja kar dubara try karein.";
                    return;
                }

                const payload = {
                    EmployeeID: formattedMobile, // Saves as +923001234567
                    EmployeeName: empname,
                    Latitude: lat,
                    Longitude: lon,
                    Accuracy: accuracy,
                    City: selectedLoc, 
                    Battery: battery,
                    Device: getDeviceOS(),
                    DeviceToken: deviceToken // Unique identity signature token
                };

                msgDiv.innerText = "Verifying parameters against sheet database...";

                fetch(script_url, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if(data.success) {
                        msgDiv.style.color = "#0b7a3e";
                        msgDiv.innerText = data.message;
                        document.getElementById("empid").value = "";
                        document.getElementById("empname").value = "";
                    } else {
                        msgDiv.style.color = "red";
                        msgDiv.innerText = data.error;
                    }
                })
                .catch(err => {
                    msgDiv.style.color = "red";
                    msgDiv.innerText = "Network Error: Server response failure.";
                });
            },
            (error) => {
                msgDiv.style.color = "red";
                msgDiv.innerText = "GPS Error: Please enable location services on your mobile.";
            },
            { enableHighAccuracy: true, timeout: 12000 }
        );
    }
</script>
</body> 
</html>
